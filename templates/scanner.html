<!DOCTYPE html>
<html>
<head>

<title>Run Cyber Security Scan</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background: linear-gradient(135deg,#020617,#0f172a,#1e293b);
color:#ffffff;
font-family: 'Segoe UI', Arial;
}

/* Main Scan Card */

.card{
background: linear-gradient(145deg,#0f172a,#1e293b);
border-radius:16px;
padding:35px;
box-shadow:0 10px 35px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.05);
}

/* Labels */

label{
color:#38bdf8;
font-weight:600;
font-size:15px;
}

/* Inputs */

input{
background:#020617 !important;
color:#ffffff !important;
border:1px solid #334155 !important;
height:45px;
}

input:focus{
border-color:#38bdf8 !important;
box-shadow:none !important;
}

/* Radio text */

.form-check-label{
color:#ffffff;
}

/* Main Button */

.btn-main{
background: linear-gradient(90deg,#38bdf8,#0ea5e9);
border:none;
padding:12px 25px;
font-weight:600;
border-radius:8px;
color:#021018;
}

.btn-main:hover{
background: linear-gradient(90deg,#0ea5e9,#38bdf8);
}

/* Detect IP button */

.btn-warning{
background:#facc15;
border:none;
font-weight:600;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Run Cyber Security Scan</h2>

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card">

<form method="POST">

<label>Target IP</label>

<div class="input-group mb-3">

<input type="text"
name="ip"
id="ipField"
class="form-control"
value="{{ip}}"
required>

<button type="button"
class="btn btn-warning"
onclick="detectIP()">

Detect My IP

</button>

</div>


<label>Email (for breach check)</label>

<input type="text"
name="email"
class="form-control mb-3"
required>


<label>Phishing Simulation</label>

<div class="form-check">

<input class="form-check-input"
type="radio"
name="phishing"
value="click"
required>

<label class="form-check-label">
Click suspicious link
</label>

</div>

<div class="form-check">

<input class="form-check-input"
type="radio"
name="phishing"
value="ignore">

<label class="form-check-label">
Ignore email
</label>

</div>

<br>

<button class="btn btn-main">
Run Security Scan
</button>

</form>

</div>

</div>

</div>

</div>

<script>

function detectIP(){

fetch("/get-ip")
.then(res => res.json())
.then(data => {
document.getElementById("ipField").value = data.ip
})

}

</script>

</body>
</html>
